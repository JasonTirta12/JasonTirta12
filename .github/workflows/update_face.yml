name: Update Profile Face

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Add these two lines right here:
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Change Face Expression
        run: |
          FACES=("( ͡° ͜ʖ ͡°)" "(・_・;)" "(⌐■_■)" "( ﾟヮﾟ)" "(*^.^*)")
          SELECTED_FACE=${FACES[$RANDOM % ${#FACES[@]}]}
          sed -i "s|<!-- FACE_PLACEHOLDER -->.*|<!-- FACE_PLACEHOLDER --> $SELECTED_FACE|g" README.md

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Mood update: Face changed" || exit 0
          git push